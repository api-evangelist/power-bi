specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Power BI
providerId: power-bi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Business Intelligence
  - Dashboards
  - Microsoft
  - Reporting
description: >-
  Microsoft Power BI is sold in two parallel shapes. Per-user licenses
  (Free, Pro at $14/user/month, Premium Per User at $24/user/month) cover
  authoring, sharing, and consumption. Capacity-based plans (Power BI
  Embedded, and Microsoft Fabric F-SKU capacity for Power BI workloads)
  cover ISV embedding and tenant-scale workloads with hourly or annually
  reserved billing. Embedded and F-SKU capacity prices vary by SKU and are
  configured in Azure; the per-user prices here are taken directly from the
  Microsoft Power BI pricing page.
sources:
  - https://www.microsoft.com/en-us/power-platform/products/power-bi/pricing
  - https://learn.microsoft.com/en-us/power-bi/developer/embedded/embedded-faq
plans:
  - id: power-bi-free
    name: Power BI (Free)
    type: freemium
    description: Individual report authoring and personal use; no sharing in My Workspace beyond personal scope.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Personal Report Authoring
      - name: Visual Analytics
  - id: power-bi-pro
    name: Power BI Pro
    type: subscription
    description: Per-user license for publishing and sharing Power BI reports.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$14.00 user/month, paid yearly'
        userMultiplied: true
      - label: Model Memory
        name: model_memory
        type: quota
        metric: GB
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Storage per License
        name: storage
        type: quota
        metric: GB
        limit: 10
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Dataset Refreshes per Day
        name: dataset_refreshes
        type: quota
        metric: refresh
        limit: 8
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Publish and Share Reports
      - name: Power BI REST API
      - name: Embed for Development Testing
  - id: power-bi-ppu
    name: Power BI Premium Per User
    type: subscription
    description: Per-user license including Pro plus larger model sizes and more frequent refresh.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$24.00 user/month, paid yearly'
        userMultiplied: true
      - label: Model Memory
        name: model_memory
        type: quota
        metric: GB
        limit: 100
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Storage Capacity
        name: storage
        type: quota
        metric: TB
        limit: 100
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Dataset Refreshes per Day
        name: dataset_refreshes
        type: quota
        metric: refresh
        limit: 48
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: All Pro Features
      - name: Larger Model Sizes
      - name: More Frequent Refreshes
      - name: Paginated Reports
      - name: AI Visuals
  - id: power-bi-embedded
    name: Power BI Embedded (Azure A SKU)
    type: usage-based
    description: Hourly Azure-billed capacity for ISVs embedding Power BI in customer applications; pause to stop billing.
    entries:
      - label: Capacity Hour
        name: capacity_hour
        type: metered
        metric: hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: see Azure pricing calculator (A SKU per-hour rates vary by node size)
        userMultiplied: false
    elements:
      - name: Embed for Customers
      - name: Hourly Pause/Resume
      - name: Multi-Geo Capacity
      - name: Service Principal Authentication
  - id: power-bi-fabric-capacity
    name: Microsoft Fabric Capacity (F SKUs)
    type: usage-based
    description: Pay-as-you-go or annually reserved Fabric capacity (F2/F4/F8/F16/F32/F64+) that hosts Power BI Premium workloads.
    entries:
      - label: Capacity Reservation Discount
        name: reservation_discount
        type: tiered
        metric: percent
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '40.5% over pay-as-you-go (annual reservation)'
        userMultiplied: false
      - label: Capacity Hour
        name: capacity_hour
        type: metered
        metric: hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: see Azure / Microsoft Fabric pricing calculator
        userMultiplied: false
    elements:
      - name: Power BI Premium Workloads
      - name: Dataflows Gen2
      - name: Lakehouse and Direct Lake
      - name: Pause and Resume
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
