naftiko: "1.0.0-alpha1"

info:
  label: "Power BI Analytics and Reporting"
  description: "Unified workflow for Power BI analytics operations including dataset management, report creation and distribution, dashboard monitoring, workspace administration, and gateway configuration. Used by BI analysts, report developers, and Power BI administrators."
  tags:
    - Power BI
    - Analytics
    - Business Intelligence
    - Reporting
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      POWER_BI_ACCESS_TOKEN: POWER_BI_ACCESS_TOKEN

capability:
  consumes:
    - import: power-bi
      location: ./shared/power-bi-rest.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: power-bi-analytics-api
      description: "Unified REST API for Power BI analytics and reporting."
      resources:
        - path: /v1/datasets
          name: datasets
          description: "Dataset management"
          operations:
            - method: GET
              name: list-datasets
              description: "List all datasets"
              call: "power-bi.get-datasets"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-dataset
              description: "Create a dataset"
              call: "power-bi.create-dataset"
              with:
                name: "rest.name"
                tables: "rest.tables"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/datasets/{datasetId}
          name: dataset
          description: "Individual dataset operations"
          operations:
            - method: GET
              name: get-dataset
              description: "Get dataset details"
              call: "power-bi.get-dataset"
              with:
                datasetId: "rest.datasetId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-dataset
              description: "Delete a dataset"
              call: "power-bi.delete-dataset"
              with:
                datasetId: "rest.datasetId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: reports
          description: "Report management"
          operations:
            - method: GET
              name: list-reports
              description: "List all reports"
              call: "power-bi.get-reports"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dashboards
          name: dashboards
          description: "Dashboard management"
          operations:
            - method: GET
              name: list-dashboards
              description: "List all dashboards"
              call: "power-bi.get-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-dashboard
              description: "Create a dashboard"
              call: "power-bi.create-dashboard"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workspaces
          name: workspaces
          description: "Workspace management"
          operations:
            - method: GET
              name: list-workspaces
              description: "List workspaces"
              call: "power-bi.get-groups"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/gateways
          name: gateways
          description: "Gateway management"
          operations:
            - method: GET
              name: list-gateways
              description: "List gateways"
              call: "power-bi.get-gateways"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: power-bi-analytics-mcp
      transport: http
      description: "MCP server for AI-assisted Power BI analytics and reporting."
      tools:
        - name: list-datasets
          description: "List all Power BI datasets"
          hints:
            readOnly: true
            openWorld: true
          call: "power-bi.get-datasets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset
          description: "Get dataset details by ID"
          hints:
            readOnly: true
          call: "power-bi.get-dataset"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-dataset
          description: "Create a new dataset"
          hints:
            readOnly: false
          call: "power-bi.create-dataset"
          with:
            name: "tools.name"
            tables: "tools.tables"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-dataset
          description: "Delete a dataset"
          hints:
            destructive: true
            idempotent: true
          call: "power-bi.delete-dataset"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: refresh-dataset
          description: "Trigger a dataset refresh"
          hints:
            readOnly: false
          call: "power-bi.refresh-dataset"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-refresh-history
          description: "Get dataset refresh history"
          hints:
            readOnly: true
          call: "power-bi.get-refresh-history"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-datasources
          description: "Get datasources for a dataset"
          hints:
            readOnly: true
          call: "power-bi.get-datasources"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reports
          description: "List all Power BI reports"
          hints:
            readOnly: true
            openWorld: true
          call: "power-bi.get-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-report
          description: "Get report details by ID"
          hints:
            readOnly: true
          call: "power-bi.get-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: clone-report
          description: "Clone a report"
          hints:
            readOnly: false
          call: "power-bi.clone-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: export-report
          description: "Export a report"
          hints:
            readOnly: true
          call: "power-bi.export-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-report-pages
          description: "Get pages for a report"
          hints:
            readOnly: true
          call: "power-bi.get-pages"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-dashboards
          description: "List all dashboards"
          hints:
            readOnly: true
            openWorld: true
          call: "power-bi.get-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboard
          description: "Get dashboard details"
          hints:
            readOnly: true
          call: "power-bi.get-dashboard"
          with:
            dashboardId: "tools.dashboardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-dashboard
          description: "Create a new dashboard"
          hints:
            readOnly: false
          call: "power-bi.create-dashboard"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboard-tiles
          description: "Get tiles for a dashboard"
          hints:
            readOnly: true
          call: "power-bi.get-tiles"
          with:
            dashboardId: "tools.dashboardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-workspaces
          description: "List all workspaces"
          hints:
            readOnly: true
            openWorld: true
          call: "power-bi.get-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-workspace
          description: "Create a new workspace"
          hints:
            readOnly: false
          call: "power-bi.create-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-workspace-users
          description: "List workspace users"
          hints:
            readOnly: true
          call: "power-bi.get-group-users"
          with:
            groupId: "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-gateways
          description: "List data gateways"
          hints:
            readOnly: true
          call: "power-bi.get-gateways"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-gateway
          description: "Get gateway details"
          hints:
            readOnly: true
          call: "power-bi.get-gateway"
          with:
            gatewayId: "tools.gatewayId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-gateway-datasources
          description: "Get gateway datasources"
          hints:
            readOnly: true
          call: "power-bi.get-gateway-datasources"
          with:
            gatewayId: "tools.gatewayId"
          outputParameters:
            - type: object
              mapping: "$."
