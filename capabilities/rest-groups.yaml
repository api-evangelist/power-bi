        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addgroupuser
        method: POST
        description: Power Bi Add a Workspace User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-groupId-users-userId
