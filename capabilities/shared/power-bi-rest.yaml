naftiko: "1.0.0-alpha1"

info:
  label: "Power BI REST"
  description: "Power BI REST API for managing datasets, reports, dashboards, workspaces, imports, and gateways with OAuth 2.0 authentication."
  tags:
    - Power BI
    - Business Intelligence
    - Analytics
    - Reporting
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      POWER_BI_ACCESS_TOKEN: POWER_BI_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: power-bi
      baseUri: https://api.powerbi.com/v1.0/myorg
      description: "Power BI REST API"
      authentication:
        type: bearer
        token: "{{POWER_BI_ACCESS_TOKEN}}"
      resources:
        - name: datasets
          path: /datasets
          description: "Manage Power BI datasets"
          operations:
            - name: get-datasets
              method: GET
              description: "List datasets in My Workspace"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dataset
              method: POST
              description: "Create a new dataset"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  tables: "{{tools.tables}}"
            - name: get-dataset
              method: GET
              description: "Get a dataset by ID"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-dataset
              method: DELETE
              description: "Delete a dataset"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: refresh-dataset
              method: POST
              description: "Trigger a dataset refresh"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-refresh-history
              method: GET
              description: "Get dataset refresh history"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-datasources
              method: GET
              description: "Get datasources for a dataset"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-parameters
              method: GET
              description: "Get dataset parameters"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-parameters
              method: POST
              description: "Update dataset parameters"
              inputParameters:
                - name: datasetId
                  in: path
                  type: string
                  required: true
                  description: "Dataset ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: reports
          path: /reports
          description: "Manage Power BI reports"
          operations:
            - name: get-reports
              method: GET
              description: "List reports in My Workspace"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-report
              method: GET
              description: "Get a report by ID"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-report
              method: DELETE
              description: "Delete a report"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: clone-report
              method: POST
              description: "Clone a report"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: export-report
              method: GET
              description: "Export a report"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-pages
              method: GET
              description: "Get report pages"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dashboards
          path: /dashboards
          description: "Manage Power BI dashboards"
          operations:
            - name: get-dashboards
              method: GET
              description: "List dashboards"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dashboard
              method: POST
              description: "Create a dashboard"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-dashboard
              method: GET
              description: "Get a dashboard by ID"
              inputParameters:
                - name: dashboardId
                  in: path
                  type: string
                  required: true
                  description: "Dashboard ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-tiles
              method: GET
              description: "Get dashboard tiles"
              inputParameters:
                - name: dashboardId
                  in: path
                  type: string
                  required: true
                  description: "Dashboard ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /groups
          description: "Manage workspaces (groups)"
          operations:
            - name: get-groups
              method: GET
              description: "List workspaces"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: "Create a workspace"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-group
              method: DELETE
              description: "Delete a workspace"
              inputParameters:
                - name: groupId
                  in: path
                  type: string
                  required: true
                  description: "Group ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-group-users
              method: GET
              description: "List workspace users"
              inputParameters:
                - name: groupId
                  in: path
                  type: string
                  required: true
                  description: "Group ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-group-user
              method: POST
              description: "Add a user to a workspace"
              inputParameters:
                - name: groupId
                  in: path
                  type: string
                  required: true
                  description: "Group ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: gateways
          path: /gateways
          description: "Manage data gateways"
          operations:
            - name: get-gateways
              method: GET
              description: "List gateways"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-gateway
              method: GET
              description: "Get a gateway by ID"
              inputParameters:
                - name: gatewayId
                  in: path
                  type: string
                  required: true
                  description: "Gateway ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-gateway-datasources
              method: GET
              description: "Get gateway datasources"
              inputParameters:
                - name: gatewayId
                  in: path
                  type: string
                  required: true
                  description: "Gateway ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: power-bi-rest-api
      resources:
        - path: /v1/datasets
          name: datasets
          description: "Dataset management"
          operations:
            - method: GET
              name: get-datasets
              description: "List datasets"
              call: "power-bi.get-datasets"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: reports
          description: "Report management"
          operations:
            - method: GET
              name: get-reports
              description: "List reports"
              call: "power-bi.get-reports"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dashboards
          name: dashboards
          description: "Dashboard management"
          operations:
            - method: GET
              name: get-dashboards
              description: "List dashboards"
              call: "power-bi.get-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: power-bi-mcp
      transport: http
      tools:
        - name: get-datasets
          description: "List Power BI datasets"
          hints:
            readOnly: true
          call: "power-bi.get-datasets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset
          description: "Get a dataset by ID"
          hints:
            readOnly: true
          call: "power-bi.get-dataset"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-refresh-history
          description: "Get dataset refresh history"
          hints:
            readOnly: true
          call: "power-bi.get-refresh-history"
          with:
            datasetId: "tools.datasetId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-reports
          description: "List Power BI reports"
          hints:
            readOnly: true
          call: "power-bi.get-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-report
          description: "Get a report by ID"
          hints:
            readOnly: true
          call: "power-bi.get-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboards
          description: "List Power BI dashboards"
          hints:
            readOnly: true
          call: "power-bi.get-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboard
          description: "Get a dashboard by ID"
          hints:
            readOnly: true
          call: "power-bi.get-dashboard"
          with:
            dashboardId: "tools.dashboardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-tiles
          description: "Get tiles for a dashboard"
          hints:
            readOnly: true
          call: "power-bi.get-tiles"
          with:
            dashboardId: "tools.dashboardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-groups
          description: "List workspaces"
          hints:
            readOnly: true
          call: "power-bi.get-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-gateways
          description: "List data gateways"
          hints:
            readOnly: true
          call: "power-bi.get-gateways"
          outputParameters:
            - type: object
              mapping: "$."
