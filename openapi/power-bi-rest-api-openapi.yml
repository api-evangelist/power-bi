      operationId: getReports
      summary: Power Bi List Reports
      description: >-
        Returns a list of reports from the user's My Workspace. Each report
        includes metadata such as name, the associated dataset, web URL, and
        embed URL for embedding scenarios.
      tags:
      - Reports
      responses:
        '200':
          description: List of reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportList'
              examples:
                Getreports200Example:
                  summary: Default getReports 200 response
                  x-microcks-default: true
                  value:
                    value:
