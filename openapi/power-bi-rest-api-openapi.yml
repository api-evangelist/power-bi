      responses:
        '200':
          description: List of data sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasourceList'
              examples:
                Getdatasources200Example:
                  summary: Default getDatasources 200 response
                  x-microcks-default: true
                  value:
