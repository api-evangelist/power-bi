openapi: 3.1.0
info:
  title: Power BI REST API
  description: >-
    The Power BI REST API provides service endpoints for embedding,
    administration, governance, and user resources. It enables programmatic
    access to Power BI content including datasets, reports, dashboards, and
    workspaces (groups). The API uses Azure Active Directory (OAuth 2.0) for
    authentication and authorization.
  version: '1.0'
  contact:
    name: Microsoft Power BI Support
    url: https://powerbi.microsoft.com/en-us/support/
  termsOfService: https://powerbi.microsoft.com/en-us/api-terms/
  license:
    name: Microsoft API License
    url: https://powerbi.microsoft.com/en-us/terms-of-service/
externalDocs:
  description: Power BI REST API Reference
  url: https://learn.microsoft.com/en-us/rest/api/power-bi/
servers:
- url: https://api.powerbi.com/v1.0/myorg
  description: Power BI REST API - User context
tags:
- name: Dashboards
  description: >-
    Manage dashboards including listing, creating, and retrieving tiles.
    Dashboards are single-page canvases with pinned visualizations.
- name: Datasets
  description: >-
    Manage datasets including creating, updating, refreshing, and deleting
    datasets. Datasets represent the data model behind Power BI reports.
- name: Gateways
  description: >-
    Manage on-premises data gateways and their data sources for
    connecting to on-premises data.
- name: Groups
  description: >-
    Manage workspaces (groups) including listing, creating, deleting, and
    managing workspace users. Workspaces are containers for dashboards,
    reports, datasets, and dataflows.
- name: Imports
  description: >-
    Import Power BI content such as PBIX files, Excel workbooks, and
    RDL reports into workspaces.
- name: Reports
  description: >-
    Manage reports including listing, cloning, exporting, rebinding, and
    deleting reports. Reports are visual presentations of data from datasets.
security:
- bearerAuth: []
paths:
  /datasets:
    get:
      operationId: getDatasets
      summary: Power Bi List Datasets
      description: >-
        Returns a list of datasets from the user's My Workspace. Each dataset
        includes metadata such as name, configuration settings, and whether
        it is a push dataset or refreshable.
      tags:
      - Datasets
      responses:
        '200':
          description: List of datasets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetList'
              examples:
                Getdatasets200Example:
                  summary: Default getDatasets 200 response
                  x-microcks-default: true
                  value:
                    value:
                    - id: abc123
                      name: Example Title
                      addRowsAPIEnabled: true
                      configuredBy: example_value
                      isRefreshable: true
                      isEffectiveIdentityRequired: true
                      isEffectiveIdentityRolesRequired: true
                      isOnPremGatewayRequired: true
                      targetStorageMode: Import
                      createReportEmbedURL: https://www.example.com
                      qnaEmbedURL: https://www.example.com
                      webUrl: https://www.example.com
                      createdDate: '2026-01-15T10:30:00Z'
                      contentProviderType: example_value
                    '@odata.context': example_value
        '401':
          description: Unauthorized - missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Getdatasets401Example:
                  summary: Default getDatasets 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createDataset
      summary: Power Bi Create a Push Dataset
      description: >-
        Creates a new push dataset in the user's My Workspace. Push datasets
        allow applications to push data directly into Power BI in real time
        without needing a data source or scheduled refresh.
      tags:
      - Datasets
      parameters:
      - name: defaultRetentionPolicy
        in: query
        description: The default retention policy for the dataset
        schema:
          type: string
          enum:
          - None
          - basicFIFO
        example: None
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
            examples:
              CreatedatasetRequestExample:
                summary: Default createDataset request
                x-microcks-default: true
                value:
                  name: Example Title
                  defaultMode: Push
                  tables:
                  - name: Example Title
                    columns: {}
                    rows: {}
                    measures: {}
                  relationships:
                  - name: Example Title
                    fromTable: example_value
                    fromColumn: example_value
                    toTable: example_value
                    toColumn: example_value
                    crossFilteringBehavior: OneDirection
      responses:
        '201':
          description: Dataset created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
              examples:
                Createdataset201Example:
                  summary: Default createDataset 201 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    name: Example Title
                    addRowsAPIEnabled: true
                    configuredBy: example_value
                    isRefreshable: true
                    isEffectiveIdentityRequired: true
                    isEffectiveIdentityRolesRequired: true
                    isOnPremGatewayRequired: true
                    targetStorageMode: Import
                    createReportEmbedURL: https://www.example.com
                    qnaEmbedURL: https://www.example.com
                    webUrl: https://www.example.com
                    createdDate: '2026-01-15T10:30:00Z'
                    contentProviderType: example_value
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Createdataset400Example:
                  summary: Default createDataset 400 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Createdataset401Example:
                  summary: Default createDataset 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
        '409':
          description: Dataset name conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Createdataset409Example:
                  summary: Default createDataset 409 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /datasets/{datasetId}:
    get:
      operationId: getDataset
      summary: Power Bi Get a Dataset
      description: >-
        Returns the specified dataset from the user's My Workspace, including
        its configuration, tables, and data source details.
      tags:
      - Datasets
      parameters:
      - $ref: '#/components/parameters/datasetId'
      responses:
        '200':
          description: Dataset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
              examples:
                Getdataset200Example:
                  summary: Default getDataset 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    name: Example Title
                    addRowsAPIEnabled: true
                    configuredBy: example_value
                    isRefreshable: true
                    isEffectiveIdentityRequired: true
                    isEffectiveIdentityRolesRequired: true
                    isOnPremGatewayRequired: true
                    targetStorageMode: Import
                    createReportEmbedURL: https://www.example.com
                    qnaEmbedURL: https://www.example.com
                    webUrl: https://www.example.com
                    createdDate: '2026-01-15T10:30:00Z'
                    contentProviderType: example_value
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Getdataset401Example:
                  summary: Default getDataset 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Getdataset404Example:
                  summary: Default getDataset 404 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteDataset
      summary: Power Bi Delete a Dataset
      description: >-
        Deletes the specified dataset from the user's My Workspace. This also
        deletes all reports and dashboard tiles that are built on the dataset.
      tags:
      - Datasets
      parameters:
      - $ref: '#/components/parameters/datasetId'
      responses:
        '200':
          description: Dataset deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Deletedataset401Example:
                  summary: Default deleteDataset 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Deletedataset404Example:
                  summary: Default deleteDataset 404 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /datasets/{datasetId}/refreshes:
    get:
      operationId: getRefreshHistory
      summary: Power Bi Get Refresh History
      description: >-
        Returns the refresh history for the specified dataset. The response
        includes the status, start time, and end time of each refresh
        operation.
      tags:
      - Datasets
      parameters:
      - $ref: '#/components/parameters/datasetId'
      - name: $top
        in: query
        description: Maximum number of refresh entries to return
        schema:
          type: integer
          default: 10
        example: 10
      responses:
        '200':
          description: List of refresh entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshList'
              examples:
                Getrefreshhistory200Example:
                  summary: Default getRefreshHistory 200 response
                  x-microcks-default: true
                  value:
                    value:
                    - requestId: '500123'
                      id: abc123
                      refreshType: Scheduled
                      startTime: '2026-01-15T10:30:00Z'
                      endTime: '2026-01-15T10:30:00Z'
                      status: Unknown
                      serviceExceptionJson: example_value
                    '@odata.context': example_value
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Getrefreshhistory401Example:
                  summary: Default getRefreshHistory 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Getrefreshhistory404Example:
                  summary: Default getRefreshHistory 404 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: refreshDataset
      summary: Power Bi Trigger a Dataset Refresh
      description: >-
        Triggers a refresh for the specified dataset. For enhanced refresh
        capabilities, include a request body specifying tables, partitions,
        or the type of refresh.
      tags:
      - Datasets
      parameters:
      - $ref: '#/components/parameters/datasetId'
      requestBody:
        description: Optional enhanced refresh request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              RefreshdatasetRequestExample:
                summary: Default refreshDataset request
                x-microcks-default: true
                value:
                  type: Full
                  commitMode: transactional
                  maxParallelism: 10
                  retryCount: 10
                  objects:
                  - table: example_value
                    partition: example_value
      responses:
        '202':
          description: Refresh triggered successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Refreshdataset401Example:
                  summary: Default refreshDataset 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Refreshdataset404Example:
                  summary: Default refreshDataset 404 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /datasets/{datasetId}/datasources:
