        delay: 0
        dispatcher: FALLBACK
  /datasets/{datasetId}/parameters:
    get:
      operationId: getParameters
      summary: Power Bi Get Dataset Parameters
      description: >-
        Returns a list of parameters for the specified dataset. Parameters
        allow dynamic configuration of data source connections and query
        behavior.
      tags:
      - Datasets
      parameters:
      - $ref: '#/components/parameters/datasetId'
      responses:
        '200':
          description: List of parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParameterList'
              examples:
                Getparameters200Example:
                  summary: Default getParameters 200 response
                  x-microcks-default: true
                  value:
                    value:
                    - name: Example Title
                      type: example_value
                      currentValue: example_value
                      isRequired: true
                      suggestedValues: {}
                    '@odata.context': example_value
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Getparameters401Example:
                  summary: Default getParameters 401 response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      details:
                      - message: example_value
                        target: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: updateParameters
      summary: Power Bi Update Dataset Parameters
      description: >-
        Updates the values of one or more parameters for the specified dataset.
        After updating parameters, a dataset refresh is required for the new
        values to take effect.
      tags:
      - Datasets
      parameters:
      - $ref: '#/components/parameters/datasetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParametersRequest'
            examples:
              UpdateparametersRequestExample:
                summary: Default updateParameters request
                x-microcks-default: true
                value:
                  updateDetails:
                  - name: Example Title
                    newValue: example_value
      responses:
        '200':
          description: Parameters updated successfully
        '400':
          description: Invalid parameter values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Updateparameters400Example:
                  summary: Default updateParameters 400 response
                  x-microcks-default: true
